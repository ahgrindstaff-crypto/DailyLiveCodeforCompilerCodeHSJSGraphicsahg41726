<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Real-Time Logic Lab · JS Graphics</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  /* ============================================
     DESIGN TOKENS
     ============================================ */
  :root {
    --bg-deepest: #0a0e17;
    --bg-base: #0f1420;
    --bg-surface: #161c2c;
    --bg-elevated: #1d2438;
    --bg-hover: #242c45;
    --border: #2a3349;
    --border-bright: #3d4a6b;
    --text: #e8edf5;
    --text-muted: #8b94a8;
    --text-dim: #5e6680;
    --accent: #5eead4;
    --accent-glow: #5eead455;
    --warm: #fbbf24;
    --purple: #c084fc;
    --pink: #fb7185;
    --blue: #93c5fd;
    --danger: #f87171;
    --grid: #1a2236;

    --font-display: 'Bricolage Grotesque', sans-serif;
    --font-body: 'Manrope', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;

    --shadow-soft: 0 10px 30px rgba(0,0,0,0.4);
    --shadow-glow: 0 0 40px var(--accent-glow);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    background: var(--bg-base);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 15px;
    line-height: 1.5;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    background-image:
      radial-gradient(circle at 15% 0%, rgba(94,234,212,0.08), transparent 40%),
      radial-gradient(circle at 85% 100%, rgba(192,132,252,0.07), transparent 45%),
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 100% 100%, 100% 100%, 32px 32px, 32px 32px;
    background-position: 0 0, 0 0, -1px -1px, -1px -1px;
  }

  .app {
    display: grid;
    grid-template-columns: 320px 1fr;
    grid-template-rows: 64px 1fr;
    grid-template-areas:
      "header header"
      "sidebar main";
    height: 100vh;
  }

  .header {
    grid-area: header;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    background: rgba(15, 20, 32, 0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    z-index: 10;
  }

  .brand { display: flex; align-items: center; gap: 14px; }

  .brand-mark {
    width: 36px; height: 36px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), #2dd4bf);
    display: grid; place-items: center;
    color: var(--bg-deepest);
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: 18px;
    box-shadow: 0 4px 14px rgba(94,234,212,0.3);
    position: relative;
  }
  .brand-mark::after {
    content: '';
    position: absolute;
    inset: -4px;
    border: 1px solid var(--accent);
    border-radius: 12px;
    opacity: 0.3;
  }

  .brand-text { display: flex; flex-direction: column; }
  .brand-title {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 18px;
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .brand-sub {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    margin-top: 4px;
    text-transform: uppercase;
  }

  .header-right { display: flex; align-items: center; gap: 12px; }

  .day-counter {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text-muted);
    padding: 6px 12px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  .day-counter strong { color: var(--accent); font-weight: 700; }

  .icon-btn {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 8px 14px;
    border-radius: 6px;
    font-family: var(--font-mono);
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.15s;
    letter-spacing: 0.03em;
  }
  .icon-btn:hover {
    background: var(--bg-hover);
    color: var(--text);
    border-color: var(--border-bright);
  }
  .icon-btn.active {
    background: var(--accent);
    color: var(--bg-deepest);
    border-color: var(--accent);
    font-weight: 600;
  }

  .sidebar {
    grid-area: sidebar;
    background: rgba(15, 20, 32, 0.7);
    backdrop-filter: blur(8px);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 20px 0;
  }
  .sidebar::-webkit-scrollbar { width: 8px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .sidebar::-webkit-scrollbar-thumb:hover { background: var(--border-bright); }

  .sidebar-header {
    padding: 0 24px 16px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
  }
  .sidebar-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .sidebar-title {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 15px;
    color: var(--text);
  }

  .progress-bar {
    margin: 0 24px 20px;
    height: 4px;
    background: var(--bg-elevated);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--purple));
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: 2px;
  }

  .week { margin-bottom: 8px; }

  .week-header {
    padding: 14px 24px 10px;
    display: flex;
    align-items: baseline;
    gap: 12px;
  }
  .week-num {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--purple);
    letter-spacing: 0.1em;
    font-weight: 700;
  }
  .week-title {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 13px;
    color: var(--text);
  }
  .week-sub {
    font-size: 11px;
    color: var(--text-dim);
    margin-left: auto;
    font-family: var(--font-mono);
  }

  .day-list { list-style: none; padding: 0 12px; }

  .day-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.12s;
    margin-bottom: 2px;
    position: relative;
  }
  .day-item:hover { background: var(--bg-hover); }
  .day-item.active {
    background: var(--bg-elevated);
    box-shadow: inset 3px 0 0 var(--accent);
  }
  .day-item.visited .day-num { color: var(--accent); }

  .day-num {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
    width: 28px;
    flex-shrink: 0;
    font-weight: 600;
  }
  .day-item.active .day-num { color: var(--accent); }

  .day-name {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 500;
    flex: 1;
  }
  .day-item.active .day-name { color: var(--text); }

  .visited-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .day-item.visited .visited-dot { opacity: 0.6; }
  .day-item.active .visited-dot { opacity: 1; }

  .sidebar-footer {
    padding: 20px 24px;
    margin-top: 12px;
    border-top: 1px solid var(--border);
  }

  .workflow-toggle {
    width: 100%;
    background: transparent;
    border: 1px dashed var(--border);
    color: var(--text-muted);
    padding: 10px;
    border-radius: 6px;
    font-family: var(--font-mono);
    font-size: 11px;
    cursor: pointer;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  .workflow-toggle:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .main {
    grid-area: main;
    overflow-y: auto;
    padding: 32px 48px 48px;
    position: relative;
  }
  .main::-webkit-scrollbar { width: 10px; }
  .main::-webkit-scrollbar-track { background: transparent; }
  .main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }

  .main-inner {
    max-width: 920px;
    margin: 0 auto;
    animation: fadeUp 0.45s cubic-bezier(0.4, 0, 0.2, 1);
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .day-meta {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 14px;
  }

  .day-badge {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--bg-deepest);
    background: var(--accent);
    padding: 4px 10px;
    border-radius: 4px;
  }

  .week-pill {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--purple);
    border: 1px solid color-mix(in srgb, var(--purple) 30%, transparent);
    padding: 3px 9px;
    border-radius: 4px;
    letter-spacing: 0.05em;
  }

  .day-title {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: clamp(36px, 5vw, 56px);
    letter-spacing: -0.03em;
    line-height: 1;
    margin-bottom: 18px;
    background: linear-gradient(180deg, var(--text) 60%, var(--text-muted));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 32px;
  }
  .tag {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-muted);
    background: var(--bg-surface);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 4px;
    letter-spacing: 0.02em;
  }

  .intro-card {
    background: linear-gradient(135deg, rgba(251,191,36,0.06), rgba(251,191,36,0.02));
    border: 1px solid color-mix(in srgb, var(--warm) 25%, transparent);
    border-left: 3px solid var(--warm);
    padding: 24px 28px;
    border-radius: 10px;
    margin-bottom: 32px;
    position: relative;
  }
  .intro-card::before {
    content: '';
    position: absolute;
    top: 16px; left: -2px;
    width: 7px; height: 7px;
    background: var(--warm);
    border-radius: 50%;
    box-shadow: 0 0 12px var(--warm);
    transform: translateX(-50%);
  }
  .intro-label {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--warm);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 700;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .intro-text {
    font-family: var(--font-display);
    font-weight: 400;
    font-size: 19px;
    line-height: 1.55;
    color: var(--text);
    letter-spacing: -0.005em;
  }

  .code-card {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: var(--shadow-soft);
    margin-bottom: 24px;
  }

  .code-toolbar {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    background: var(--bg-elevated);
    border-bottom: 1px solid var(--border);
    gap: 12px;
  }

  .traffic { display: flex; gap: 6px; margin-right: 8px; }
  .traffic span {
    width: 11px; height: 11px;
    border-radius: 50%;
    background: var(--border-bright);
  }
  .traffic span:nth-child(1) { background: #ff5f57; }
  .traffic span:nth-child(2) { background: #febc2e; }
  .traffic span:nth-child(3) { background: #28c840; }

  .code-tab {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text);
    background: var(--bg-surface);
    padding: 6px 14px;
    border-radius: 5px 5px 0 0;
    margin-bottom: -13px;
    border: 1px solid var(--border);
    border-bottom: none;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .code-tab .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
  }

  .code-actions { margin-left: auto; display: flex; gap: 8px; }

  .code-action {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 5px 10px;
    border-radius: 5px;
    font-family: var(--font-mono);
    font-size: 11px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.15s;
    letter-spacing: 0.02em;
  }
  .code-action:hover {
    color: var(--text);
    border-color: var(--border-bright);
    background: var(--bg-hover);
  }
  .code-action.live {
    color: var(--warm);
    border-color: color-mix(in srgb, var(--warm) 30%, transparent);
  }
  .code-action.live.engaged {
    background: var(--warm);
    color: var(--bg-deepest);
    border-color: var(--warm);
    font-weight: 600;
  }

  .code-body {
    position: relative;
    background: var(--bg-deepest);
    overflow-x: auto;
  }

  .code-body pre {
    margin: 0;
    padding: 22px 22px 22px 0;
    font-family: var(--font-mono);
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
    counter-reset: line;
  }

  .code-body.live-mode pre {
    filter: blur(7px);
    user-select: none;
    transition: filter 0.3s;
  }

  .live-overlay {
    display: none;
    position: absolute;
    inset: 0;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 14px;
    background: rgba(10,14,23,0.6);
    z-index: 5;
    backdrop-filter: blur(2px);
  }
  .code-body.live-mode .live-overlay { display: flex; }
  .live-overlay-icon {
    font-family: var(--font-mono);
    color: var(--warm);
    font-size: 28px;
    letter-spacing: 0.1em;
    font-weight: 700;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .live-overlay-text {
    font-family: var(--font-display);
    font-size: 16px;
    color: var(--text);
    text-align: center;
    max-width: 320px;
  }
  .live-overlay-hint {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }

  .code-line {
    display: block;
    padding-left: 60px;
    position: relative;
    counter-increment: line;
  }
  .code-line::before {
    content: counter(line);
    position: absolute;
    left: 0;
    width: 44px;
    text-align: right;
    color: var(--text-dim);
    font-size: 12px;
    user-select: none;
    padding-right: 4px;
    border-right: 1px solid var(--border);
    margin-right: 12px;
  }

  .tk-keyword { color: var(--purple); font-weight: 500; }
  .tk-fn { color: var(--accent); }
  .tk-string { color: var(--warm); }
  .tk-number { color: var(--pink); }
  .tk-comment { color: var(--text-dim); font-style: italic; }
  .tk-var { color: var(--blue); }
  .tk-class { color: var(--accent); font-weight: 500; }
  .tk-prop { color: #fde68a; }
  .tk-op { color: var(--text-muted); }

  .preview-card {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 24px;
    display: none;
  }
  .preview-card.shown { display: block; }

  .preview-header {
    padding: 14px 18px;
    background: var(--bg-elevated);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .preview-label {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    text-transform: uppercase;
    font-weight: 600;
  }
  .preview-label .live-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    margin-right: 6px;
    animation: pulse 1.6s infinite;
    vertical-align: middle;
  }
  .preview-actions { margin-left: auto; display: flex; gap: 6px; }
  .preview-body {
    padding: 24px;
    background: repeating-linear-gradient(
      45deg,
      var(--bg-deepest),
      var(--bg-deepest) 12px,
      #0c111c 12px,
      #0c111c 24px
    );
    display: flex;
    justify-content: center;
  }
  #previewCanvas {
    background: white;
    border-radius: 6px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5), 0 0 0 1px var(--border-bright);
    display: block;
    cursor: crosshair;
  }
  .preview-hint {
    text-align: center;
    margin-top: 12px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.03em;
  }

  .day-nav {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    margin-top: 36px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }

  .nav-btn {
    flex: 1;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 14px 18px;
    border-radius: 8px;
    cursor: pointer;
    font-family: var(--font-body);
    font-weight: 500;
    text-align: left;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .nav-btn:hover:not(:disabled) {
    background: var(--bg-hover);
    border-color: var(--border-bright);
    transform: translateY(-1px);
  }
  .nav-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .nav-btn.next { text-align: right; }

  .nav-direction {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .nav-day { font-size: 14px; color: var(--text); }

  body.projector .day-title { font-size: clamp(48px, 7vw, 72px); }
  body.projector .intro-text { font-size: 24px; }
  body.projector .code-body pre { font-size: 18px; line-height: 1.85; }
  body.projector .code-line::before { font-size: 14px; }
  body.projector .tag { font-size: 13px; padding: 5px 12px; }
  body.projector .day-badge { font-size: 13px; padding: 5px 12px; }

  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(10,14,23,0.85);
    backdrop-filter: blur(6px);
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .modal-backdrop.shown { display: flex; }
  .modal {
    background: var(--bg-surface);
    border: 1px solid var(--border-bright);
    border-radius: 14px;
    max-width: 640px;
    width: 100%;
    padding: 36px;
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: var(--shadow-soft), var(--shadow-glow);
  }
  .modal-title {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 26px;
    margin-bottom: 8px;
    letter-spacing: -0.02em;
  }
  .modal-sub {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 24px;
  }
  .modal p {
    color: var(--text-muted);
    margin-bottom: 14px;
    line-height: 1.65;
  }
  .modal p strong { color: var(--text); font-weight: 600; }
  .modal-close {
    margin-top: 24px;
    background: var(--accent);
    color: var(--bg-deepest);
    border: none;
    padding: 10px 20px;
    border-radius: 6px;
    font-family: var(--font-mono);
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    font-size: 12px;
  }
  .modal-close:hover { opacity: 0.9; }

  @media (max-width: 960px) {
    .app { grid-template-columns: 1fr; grid-template-areas: "header" "main"; }
    .sidebar { display: none; }
    .main { padding: 24px; }
  }
</style>
</head>
<body>
<div class="app">

  <header class="header">
    <div class="brand">
      <div class="brand-mark">⏵</div>
      <div class="brand-text">
        <div class="brand-title">Real-Time Logic Lab</di
